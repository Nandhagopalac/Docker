events {}

   http {
       upstream flask_backend {
           server nandha-flask1:5000;
           server gopal-flask2:5000;
       }

       server {
           listen 80;

           location / {
               proxy_pass http://flask_backend;
               proxy_set_header Host $host;
           }

           location /node/ {
               proxy_pass http://agalya-node-app:3000/;
           }
       }
   }